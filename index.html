<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Geometri: Titik ke Titik</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 20px;
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            pointer-events: none; max-width: 300px; z-index: 100;
        }
        .status-box {
            margin-top: 15px; padding: 10px; border-radius: 6px;
            background: #eef2f3; border-left: 5px solid #3498db;
            color: #2c3e50; font-weight: bold;
        }
        h2 { margin: 0 0 10px 0; color: #16213e; font-size: 1.2em; }
        p { margin: 0; color: #555; font-size: 0.9em; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Simulasi Lipat Kertas</h2>
        <p>1. Klik Titik Asal (Merah)<br>2. Klik Titik Tujuan (Hijau)</p>
        <div id="status" class="status-box">Menunggu Titik Asal...</div>
    </div>
    <script src="origami-touch.js"></script>
</body>
</html>
