<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Geometri 3D: Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #0f0c29; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.9); padding: 20px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none; max-width: 280px; z-index: 100;
        }
        .status-box {
            margin-top: 15px; padding: 12px; border-radius: 8px;
            background: #f8f9fa; border-left: 5px solid #2980b9;
            color: #2c3e50; font-weight: bold; font-size: 0.9em;
        }
        h2 { margin: 0 0 10px 0; color: #1a1a2e; font-size: 1.2em; }
        #btn-container {
            position: absolute; bottom: 30px; right: 30px; display: flex; gap: 10px; z-index: 200;
        }
        .action-btn {
            padding: 12px 25px; border: none; border-radius: 50px;
            background: #e74c3c; color: white; font-weight: bold;
            cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Simulasi Origami 3D</h2>
        <p>• <b>Klik Kiri:</b> Pilih Titik<br>
           • <b>Klik Kanan:</b> Putar Kamera</p>
        <div id="status" class="status-box">Pilih Titik Asal...</div>
    </div>

    <div id="btn-container">
        <button class="action-btn" onclick="resetKertas()">Reset Kertas</button>
    </div>

    <script src="origami-touch.js"></script>
</body>
</html>
