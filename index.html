<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Geometri: Titik ke Titik</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            pointer-events: none; max-width: 320px;
        }
        .status-box {
            margin-top: 15px; padding: 10px; border-radius: 6px;
            background: #e8f4fd; border: 1px solid #3498db;
            color: #2980b9; font-weight: bold; text-align: center;
        }
        h2 { margin: 0 0 10px 0; color: #2c3e50; font-size: 1.2em; }
        p { margin: 0; color: #7f8c8d; font-size: 0.85em; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>Matematika Lipatan</h2>
        <p>1. Klik titik yang ingin dipindahkan.<br>2. Klik titik tujuan lipatan.</p>
        <div id="status" class="status-box">Pilih Titik Asal</div>
    </div>
    <script src="origami-touch.js"></script>
</body>
</html>
